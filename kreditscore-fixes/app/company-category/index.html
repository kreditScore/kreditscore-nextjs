<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Company Database</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --muted: #666;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --radius: 10px;
    --success-bg: #eaf3de; --success: #3B6D11;
    --danger-bg: #fcebeb; --danger: #a32d2d;
    --blue-bg: #e6f1fb; --blue-text: #185fa5;
    --purple-bg: #eeedfe; --purple-text: #3c3489;
    --amber-bg: #faeeda; --amber-text: #633806;
    --teal-bg: #e1f5ee; --teal-text: #085041;
    --coral-bg: #faece7; --coral-text: #712b13;
    --pink-bg: #fbeaf0; --pink-text: #72243e;
    --gray-bg: #f1efe8; --gray-text: #444441;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }

  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 16px 24px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 18px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo span { font-size: 22px; }
  .header-stats { margin-left: auto; font-size: 12px; color: var(--muted); }
  .header-stats strong { color: var(--text); }

  .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-num { font-size: 24px; font-weight: 600; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .search-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; }
  .search-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .search-main { flex: 1; min-width: 220px; position: relative; }
  .search-main svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  input[type=text] { width: 100%; height: 40px; padding: 0 12px 0 38px; border: 1px solid var(--border2); border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s; }
  input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  select { height: 40px; padding: 0 10px; border: 1px solid var(--border2); border-radius: 8px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; cursor: pointer; min-width: 140px; }
  select:focus { border-color: var(--accent); }
  .btn { height: 40px; padding: 0 20px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; white-space: nowrap; }
  .btn:hover { background: #1d4ed8; }
  .btn-clear { background: var(--surface); color: var(--muted); border: 1px solid var(--border2); }
  .btn-clear:hover { background: var(--bg); color: var(--text); }

  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .results-count { font-size: 13px; color: var(--muted); }
  .results-count strong { color: var(--text); }

  .table-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #fafafa; border-bottom: 0.5px solid var(--border); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; position: sticky; top: 57px; }
  tbody tr { transition: background .1s; }
  tbody tr:hover { background: #f9f9f8; }
  tbody td { padding: 10px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.05); font-size: 13px; }
  tbody tr:last-child td { border-bottom: none; }
  td.company-name { font-weight: 500; max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-ok { background: var(--success-bg); color: var(--success); }
  .badge-notok { background: var(--danger-bg); color: var(--danger); }
  .badge-na { background: var(--gray-bg); color: var(--gray-text); }
  .badge-cat-a, .badge-cat-super { background: var(--teal-bg); color: var(--teal-text); }
  .badge-cat-b, .badge-cat-elite { background: var(--blue-bg); color: var(--blue-text); }
  .badge-cat-c, .badge-cat-prime, .badge-cat-listed { background: var(--purple-bg); color: var(--purple-text); }
  .badge-cat-d, .badge-cat-standard { background: var(--amber-bg); color: var(--amber-text); }
  .badge-cat-g { background: var(--coral-bg); color: var(--coral-text); }
  .badge-cat-caution, .badge-cat-blocked, .badge-cat-watch { background: var(--danger-bg); color: var(--danger); }

  .bank-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px; font-size: 11px; background: var(--gray-bg); color: var(--gray-text); border: 0.5px solid rgba(0,0,0,0.08); white-space: nowrap; }
  .bank-hdfc { background: var(--blue-bg); color: var(--blue-text); }
  .bank-kotak { background: var(--amber-bg); color: var(--amber-text); }
  .bank-indusind { background: var(--purple-bg); color: var(--purple-text); }
  .bank-icici { background: var(--coral-bg); color: var(--coral-text); }
  .bank-axis { background: var(--pink-bg); color: var(--pink-text); }
  .bank-tata { background: var(--teal-bg); color: var(--teal-text); }
  .bank-abfl { background: var(--gray-bg); color: var(--gray-text); }

  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .page-btn { height: 34px; min-width: 34px; padding: 0 12px; border: 1px solid var(--border2); background: var(--surface); border-radius: 7px; font-size: 13px; cursor: pointer; transition: all .15s; color: var(--text); }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-info { font-size: 13px; color: var(--muted); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bank-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .bank-filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface); font-size: 12px; cursor: pointer; transition: all .15s; color: var(--muted); }
  .bank-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .bank-filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .bank-filter-label { font-size: 11px; color: var(--muted); padding: 4px 0; align-self: center; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><span>🏦</span> Bank Company Database</div>
    <div class="header-stats" id="header-stats">Loading...</div>
  </div>
</header>

<div class="main">
  <div class="stat-grid" id="stat-grid">
    <div class="stat-card"><div class="stat-label">Loading</div><div class="stat-num">...</div></div>
  </div>

  <div class="search-panel">
    <div class="search-row">
      <div class="search-main">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Company name search karo..." oninput="debounceSearch()">
      </div>
      <select id="bank-select" onchange="doSearch()">
        <option value="">All Banks</option>
      </select>
      <select id="cat-select" onchange="doSearch()">
        <option value="">All Categories</option>
        <option value="CAT A">CAT A</option>
        <option value="CAT B">CAT B</option>
        <option value="CAT C">CAT C</option>
        <option value="CAT D">CAT D</option>
        <option value="CAT G">CAT G</option>
        <option value="SUPER CAT A">SUPER CAT A</option>
        <option value="Elite">Elite (ICICI)</option>
        <option value="Prime">Prime (ICICI)</option>
        <option value="Standard">Standard (ICICI)</option>
        <option value="Caution">Caution (ICICI)</option>
        <option value="Listed">Listed (Axis)</option>
        <option value="Blocked">Blocked (Axis)</option>
      </select>
      <button class="btn btn-clear" onclick="clearAll()">Clear</button>
    </div>
    <div class="bank-filters">
      <span class="bank-filter-label">Quick filter:</span>
      <button class="bank-filter-btn" onclick="filterByBank('HDFC Bank')">HDFC Bank</button>
      <button class="bank-filter-btn" onclick="filterByBank('Kotak Bank')">Kotak Bank</button>
      <button class="bank-filter-btn" onclick="filterByBank('IndusInd Bank')">IndusInd Bank</button>
      <button class="bank-filter-btn" onclick="filterByBank('ICICI Bank')">ICICI Bank</button>
      <button class="bank-filter-btn" onclick="filterByBank('Axis Finance')">Axis Finance</button>
      <button class="bank-filter-btn" onclick="filterByBank('Tata Capital')">Tata Capital</button>
      <button class="bank-filter-btn" onclick="filterByBank('ABFL')">ABFL</button>
    </div>
  </div>

  <div class="results-header">
    <div class="results-count" id="results-count">Search karo ya koi bank select karo</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:45%">Company Name</th>
          <th style="width:18%">Bank</th>
          <th style="width:15%">Category</th>
          <th style="width:12%">Segment</th>
        </tr>
      </thead>
      <tbody id="results-body">
        <tr><td colspan="4" class="loading"><div class="spinner"></div>Database load ho raha hai...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<script>
let currentPage = 1;
let totalResults = 0;
let searchTimer = null;
let currentBank = '';

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; doSearch(); }, 300);
}

function filterByBank(bank) {
  if (currentBank === bank) {
    currentBank = '';
    document.getElementById('bank-select').value = '';
  } else {
    currentBank = bank;
    document.getElementById('bank-select').value = bank;
  }
  document.querySelectorAll('.bank-filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === bank && currentBank === bank);
  });
  currentPage = 1;
  doSearch();
}

function clearAll() {
  document.getElementById('search-input').value = '';
  document.getElementById('bank-select').value = '';
  document.getElementById('cat-select').value = '';
  currentBank = '';
  currentPage = 1;
  document.querySelectorAll('.bank-filter-btn').forEach(b => b.classList.remove('active'));
  doSearch();
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const bank = document.getElementById('bank-select').value;
  const cat = document.getElementById('cat-select').value;
  
  // Sync bank filter buttons with select
  if (bank !== currentBank) {
    currentBank = bank;
    document.querySelectorAll('.bank-filter-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === bank);
    });
  }

  const tbody = document.getElementById('results-body');
  tbody.innerHTML = '<tr><td colspan="4" class="loading"><div class="spinner"></div>Search ho raha hai...</td></tr>';

  const params = new URLSearchParams({ page: currentPage });
  if (q) params.set('q', q);
  if (bank) params.set('bank', bank);
  if (cat) params.set('cat', cat);

  try {
    const res = await fetch('/api/search?' + params);
    const data = await res.json();
    renderResults(data);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty"><div class="empty-icon">⚠️</div><p>Server se connect nahi ho pa raha. <code>python app.py</code> run karo.</p></td></tr>';
  }
}

function catBadgeClass(cat) {
  if (!cat) return 'badge-na';
  const c = cat.toLowerCase().replace(/\s+/g, '-');
  if (c.includes('super')) return 'badge-cat-super';
  if (c.includes('cat-a') || c === 'cat a') return 'badge-cat-a';
  if (c.includes('cat-b') || c === 'cat b') return 'badge-cat-b';
  if (c.includes('cat-c') || c === 'cat c') return 'badge-cat-c';
  if (c.includes('cat-d') || c === 'cat d') return 'badge-cat-d';
  if (c.includes('cat-g') || c === 'cat g') return 'badge-cat-g';
  if (c.includes('elite')) return 'badge-cat-elite';
  if (c.includes('prime')) return 'badge-cat-prime';
  if (c.includes('standard')) return 'badge-cat-standard';
  if (c.includes('caution') || c.includes('watch')) return 'badge-cat-caution';
  if (c.includes('blocked')) return 'badge-cat-blocked';
  if (c.includes('listed')) return 'badge-cat-listed';
  return 'badge-na';
}

function bankClass(bank) {
  const b = bank.toLowerCase();
  if (b.includes('hdfc')) return 'bank-hdfc';
  if (b.includes('kotak')) return 'bank-kotak';
  if (b.includes('indusind')) return 'bank-indusind';
  if (b.includes('icici')) return 'bank-icici';
  if (b.includes('axis')) return 'bank-axis';
  if (b.includes('tata')) return 'bank-tata';
  if (b.includes('abfl')) return 'bank-abfl';
  return '';
}

function segBadgeClass(seg) {
  if (!seg || seg === '' || seg === 'nan' || seg === 'NaN') return '';
  if (seg === 'Ok') return 'badge-ok';
  if (seg === 'Not Ok') return 'badge-notok';
  return 'badge-na';
}

function renderResults(data) {
  totalResults = data.total;
  const tbody = document.getElementById('results-body');
  const countEl = document.getElementById('results-count');

  countEl.innerHTML = `<strong>${data.total.toLocaleString()}</strong> companies mile`;

  if (data.results.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty"><div class="empty-icon">🔍</div><p>Koi company nahi mili</p></td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = data.results.map(r => {
    const seg = (!r.segment || r.segment === '' || r.segment === 'nan') ? '' : r.segment;
    const segBadge = seg ? `<span class="badge ${segBadgeClass(seg)}">${seg}</span>` : '<span style="color:var(--muted);font-size:12px">—</span>';
    const catBadge = r.category ? `<span class="badge ${catBadgeClass(r.category)}">${r.category}</span>` : '<span style="color:var(--muted);font-size:12px">—</span>';
    return `<tr>
      <td class="company-name" title="${r.company}">${r.company}</td>
      <td><span class="bank-tag ${bankClass(r.bank)}">${r.bank}</span></td>
      <td>${catBadge}</td>
      <td>${segBadge}</td>
    </tr>`;
  }).join('');

  renderPagination(data.total, data.page, data.per_page);
}

function renderPagination(total, page, perPage) {
  const totalPages = Math.ceil(total / perPage);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let html = '';
  html += `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← Prev</button>`;

  const start = Math.max(1, page - 2);
  const end = Math.min(totalPages, start + 4);
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span class="page-info">…</span>':''}`;
  for (let p = start; p <= end; p++) {
    html += `<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  if (end < totalPages) html += `${end<totalPages-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>Next →</button>`;
  html += `<span class="page-info">Page ${page} of ${totalPages.toLocaleString()}</span>`;

  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  doSearch();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();

    document.getElementById('header-stats').innerHTML =
      `<strong>${data.total.toLocaleString()}</strong> companies · <strong>${data.banks.length}</strong> banks`;

    const bankColors = {
      'Axis Finance': '#72243e', 'Kotak Bank': '#633806', 'IndusInd Bank': '#3c3489',
      'ICICI Bank': '#712b13', 'HDFC Bank': '#185fa5', 'Tata Capital': '#085041', 'ABFL': '#444441'
    };

    document.getElementById('stat-grid').innerHTML = [
      `<div class="stat-card"><div class="stat-label">Total Companies</div><div class="stat-num">${data.total.toLocaleString()}</div><div class="stat-sub">${data.banks.length} banks</div></div>`,
      ...data.banks.map(b => `<div class="stat-card"><div class="stat-label">${b.bank}</div><div class="stat-num" style="color:${bankColors[b.bank]||'#333'};font-size:20px">${b.cnt.toLocaleString()}</div></div>`)
    ].join('');

    const bankSel = document.getElementById('bank-select');
    data.banks.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.bank; opt.textContent = `${b.bank} (${b.cnt.toLocaleString()})`;
      bankSel.appendChild(opt);
    });
  } catch(e) {
    document.getElementById('stat-grid').innerHTML =
      '<div class="stat-card" style="grid-column:1/-1"><div class="stat-label">⚠️ Server nahi mila</div><div class="stat-num" style="font-size:14px;color:#a32d2d">Terminal mein <code>python app.py</code> run karo, phir page refresh karo</div></div>';
  }
}

async function loadInitial() {
  await loadStats();
  doSearch();
}

loadInitial();
</script>
</body>
</html>
